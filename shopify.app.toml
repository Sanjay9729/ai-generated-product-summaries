# Learn more about configuring your app at
# https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "5dedf37982a513d8341c9b3bca646d88"
name = "AI Product Summary Generator"
application_url = "https://ai-generated-product-summaries.onrender.com"
embedded = true

# ---------------------------
# Build
# ---------------------------
[build]
# Keep this false so `shopify app dev` does not overwrite the production
# application_url / app_proxy / webhook URLs with a temporary dev tunnel.
# (A dead tunnel here is what makes the storefront App Proxy return 500.)
automatically_update_urls_on_dev = false

# ---------------------------
# Webhooks
# ---------------------------
[webhooks]
api_version = "2024-10"

# App lifecycle
[[webhooks.subscriptions]]
topics = ["app/uninstalled"]
uri = "/webhooks/app/uninstalled"

[[webhooks.subscriptions]]
topics = ["app/scopes_update"]
uri = "/webhooks/app/scopes_update"

# Product sync webhooks
[[webhooks.subscriptions]]
topics = ["products/create"]
uri = "/webhooks/products/create"

[[webhooks.subscriptions]]
topics = ["products/update"]
uri = "/webhooks/products/update"

[[webhooks.subscriptions]]
topics = ["products/delete"]
uri = "/webhooks/products/delete"

# ---------------------------
# 🔐 Mandatory Compliance Webhooks (REQUIRED)
# ---------------------------
[[webhooks.subscriptions]]
compliance_topics = [
  "customers/data_request",
  "customers/redact",
  "shop/redact"
]
uri = "/webhooks/compliance"

# ---------------------------
# Access scopes
# ---------------------------
[access_scopes]
scopes = "read_products,read_product_listings,read_themes,write_products,read_locales"

# ---------------------------
# Auth
# ---------------------------
[auth]
redirect_urls = [
  "https://ai-generated-product-summaries.onrender.com/api/auth"
]

# ---------------------------
# App Proxy
# ---------------------------
[app_proxy]
prefix = "apps"
subpath = "ai-summaries"
url = "https://ai-generated-product-summaries.onrender.com/api/proxy"
